<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#1e3c72" stroke="#ffd700" stroke-width="2"/>
  
  <!-- Central 'JC' Monogram -->
  <text x="50" y="67" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="38" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-1">JC</text>
  
  <!-- Decorative System Nodes (representing interconnected systems thinking) -->
  <!-- Top left node -->
  <circle cx="28" cy="28" r="4" fill="#ffd700"/>
  <!-- Top right node -->
  <circle cx="72" cy="28" r="4" fill="#ffd700"/>
  <!-- Bottom node -->
  <circle cx="50" cy="78" r="4" fill="#ffd700"/>
  
  <!-- Connecting lines between nodes (representing systems thinking) -->
  <line x1="28" y1="28" x2="50" y2="78" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="72" y1="28" x2="50" y2="78" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="28" y1="28" x2="72" y2="28" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="3,2"/>
</svg>