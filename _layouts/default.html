<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="{{ site.description }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
    <link rel="alternate icon" href="{{ '/assets/favicon.ico' | relative_url }}">
    
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Google Analytics -->
    {% if site.google_analytics %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ site.google_analytics }}');
      
      // Helper function for tracking events
      window.trackEvent = function(eventName, eventCategory, eventLabel, eventValue) {
        if (typeof gtag !== 'undefined') {
          gtag('event', eventName, {
            'event_category': eventCategory,
            'event_label': eventLabel,
            'value': eventValue || 1
          });
          //console.log('GA Event tracked:', eventName, eventCategory, eventLabel);
        }
      };
    </script>
    {% endif %}
</head>
<body>
    {% include sidebar.html %}
    
    <main class="main-content">
        <div class="content-wrapper">
            {{ content }}
        </div>
    </main>
    
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
